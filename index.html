<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashley Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4ede5;
      --paper: #fffaf5;
      --paper-2: #f1e4d6;
      --ink: #2a1c1a;
      --muted: #6a5149;
      --deep-red: #8f2f2a;
      --red-dark: #5d1d1a;
      --brown: #a0785a;
      --tape: #d8c19d;
      --line: rgba(66, 42, 37, 0.12);
      --shadow: 0 16px 36px rgba(61, 32, 26, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(143, 47, 42, 0.10), transparent 30%),
        linear-gradient(180deg, #efe4d7 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .editorial-frame {
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .editorial-frame::before,
    .editorial-frame::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(143, 47, 42, 0.06);
      z-index: 0;
    }

    .editorial-frame::before {
      top: -70px;
      right: -40px;
    }

    .editorial-frame::after {
      bottom: -80px;
      left: -60px;
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 28px;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      color: var(--muted);
      background: rgba(255, 250, 245, 0.85);
      backdrop-filter: blur(4px);
    }

    .topbar nav {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .topbar a {
      text-decoration: none;
      color: inherit;
    }

    .hero {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 26px;
      padding: 42px 28px 24px;
      align-items: start;
    }

    .hero-copy {
      position: relative;
      padding-right: 8px;
    }

    .eyebrow {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(143, 47, 42, 0.18);
      background: rgba(143, 47, 42, 0.05);
      color: var(--deep-red);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .hero-copy h1 {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.2rem, 9vw, 6.7rem);
      line-height: 0.9;
      letter-spacing: -0.03em;
      font-weight: 600;
      color: var(--deep-red);
    }

    .hero-copy .name {
      display: block;
      margin-top: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.98rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .intro-card {
      margin-top: 26px;
      max-width: 560px;
      background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(241,228,214,0.86));
      border: 1px solid var(--line);
      padding: 22px 22px 18px;
      position: relative;
      box-shadow: 0 10px 24px rgba(75, 39, 32, 0.08);
    }

    .intro-card::before {
      content: "";
      position: absolute;
      top: -10px;
      left: 26px;
      width: 74px;
      height: 22px;
      background: rgba(216, 193, 157, 0.72);
      transform: rotate(-4deg);
      border-radius: 3px;
    }

    .intro-card p {
      margin: 0 0 16px;
      line-height: 1.7;
      color: var(--muted);
      font-size: 0.97rem;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .buttons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.9rem;
      color: var(--paper);
      background: var(--deep-red);
      transition: transform 0.25s ease, background 0.25s ease;
      box-shadow: 0 8px 18px rgba(93, 29, 26, 0.18);
    }

    .buttons a.secondary {
      background: var(--ink);
    }

    .buttons a:hover {
      transform: translateY(-2px);
      background: var(--red-dark);
    }

    .hero-visual {
      position: relative;
      min-height: 500px;
    }
